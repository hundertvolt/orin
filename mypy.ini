[mypy]
python_version = 3.10
files = mqtt_llm.py, mqtt_telemetry.py

# Stricter than mypy's defaults, but short of --strict: catches missing/
# incomplete annotations and unsound Optional/Any handling without the
# noisier strict-mode checks (disallow_any_generics, disallow_untyped_calls,
# disallow_subclassing_any) that add little value for two standalone scripts.
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_return_any = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unreachable = True
strict_equality = True

# jtop (jetson-stats) only installs on real Jetson hardware with the
# jetson_stats service running, so it isn't available - or stubbed - here.
[mypy-jtop.*]
ignore_missing_imports = True
