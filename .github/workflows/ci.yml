name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: scripts/typecheck.sh

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: scripts/lint.sh

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y mosquitto
      - run: scripts/test.sh
